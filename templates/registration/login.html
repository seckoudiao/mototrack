{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-panel">
        <div class="brand-badge mb-3"><i class="bi bi-broadcast-pin"></i></div>
        <h1 class="h3 fw-bold">MotoTrack</h1>
        <p class="text-muted mb-4">Baol Express - suivi IoT des livraisons</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="{{ form.username.id_for_label }}">Utilisateur</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label" for="{{ form.password.id_for_label }}">Mot de passe</label>
                {{ form.password }}
            </div>
            <button class="btn btn-primary w-100" type="submit">Se connecter</button>
        </form>
    </div>
</div>
{% endblock %}
